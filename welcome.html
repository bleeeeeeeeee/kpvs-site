<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КПВС — Спецодежда</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/welcome.js" defer></script>
</head>
<body>
    <div class="central">
        <header id="welcome">
            <img src="/img/logo.png" alt="logo" id="welcome-logo">
        </header>

        <div class="genders">
            <div class="mens">
                <img src="/img/mens icon.png" alt="men" id="mens-icon">
                <span class="caption">Мужская одежда</span>
            </div>
            <div class="womens">
                <img src="/img/womens icon.png" alt="women" id="womens-icon">
                <span class="caption">Женская одежда</span>
            </div>
        </div>
    </div>
    
</body>
</html>
