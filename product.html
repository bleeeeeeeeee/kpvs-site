<!DOCTYPE html>
<html lang="en">
<head>

                    <img src="/img/like.svg" alt="like" id="favorites-link">

        <div id="product-details">

    <footer class="footer">

                    <p class="footer-contact">📞 +375 (162) 58-09-31</p>
                    <p class="footer-contact">✉️ sbyt@kpvs.by</p>

                    <p>Доставка по Беларуси</p>
                    <p>Индивидуальный пошив</p>
                    <p>Гарантия качества</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ООО "КПВС". Все права защищены.</p>
            </div>
        </div>
