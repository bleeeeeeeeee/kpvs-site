<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart & Favorites Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Проверка корзины и избранного</h1>
    
    <div class="section">
        <h2>1. Мужской раздел</h2>
        <button onclick="addToMensCart()">Добавить товар #1 в корзину (мужской)</button>
        <button onclick="addToMensFavorites()">Добавить товар #2 в избранное (мужской)</button>
        <div id="mens-status"></div>
    </div>
    
    <div class="section">
        <h2>2. Женский раздел</h2>
        <button onclick="addToWomensCart()">Добавить товар #30 в корзину (женский)</button>
        <button onclick="addToWomensFavorites()">Добавить товар #31 в избранное (женский)</button>
        <div id="womens-status"></div>
    </div>
    
    <div class="section">
        <h2>3. Общая корзина и избранное</h2>
        <button onclick="showCartAndFavorites()">Показать все в корзине и избранном</button>
        <div id="combined-status"></div>
    </div>

    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('cart') || '[]');
        }
        
        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }
        
        function addToCart(id) {
            let cart = getCart();
            if (!cart.includes(id)) {
                cart.push(id);
                localStorage.setItem('cart', JSON.stringify(cart));
            }
        }
        
        function addToFavorites(id) {
            let favs = getFavorites();
            if (!favs.includes(id)) {
                favs.push(id);
                localStorage.setItem('favorites', JSON.stringify(favs));
            }
        }
        
        function addToMensCart() {
            addToCart(1);
            document.getElementById('mens-status').innerHTML = '<p class="success">✓ Товар #1 добавлен в корзину</p>';
        }
        
        function addToMensFavorites() {
            addToFavorites(2);
            document.getElementById('mens-status').innerHTML += '<p class="success">✓ Товар #2 добавлен в избранное</p>';
        }
        
        function addToWomensCart() {
            addToCart(30);
            document.getElementById('womens-status').innerHTML = '<p class="success">✓ Товар #30 (женский) добавлен в корзину</p>';
        }
        
        function addToWomensFavorites() {
            addToFavorites(31);
            document.getElementById('womens-status').innerHTML += '<p class="success">✓ Товар #31 (женский) добавлен в избранное</p>';
        }
        
        function showCartAndFavorites() {
            const cart = getCart();
            const favs = getFavorites();
            const status = document.getElementById('combined-status');
            
            status.innerHTML = `
                <h3>Корзина (${cart.length} товаров):</h3>
                <pre>${JSON.stringify(cart, null, 2)}</pre>
                <h3>Избранное (${favs.length} товаров):</h3>
                <pre>${JSON.stringify(favs, null, 2)}</pre>
                <p class="success"><strong>✓ Корзина и избранное являются ОБЩИМИ для всех разделов!</strong></p>
            `;
        }
    </script>
</body>
</html>
