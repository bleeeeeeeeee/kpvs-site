<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КПВС — Спецодежда</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/modal-lock.js" defer></script>
    <script src="/js/app-settings.js" defer></script>
    <script src="/js/utils/api.js" defer></script>
    <script src="/js/account-modal.js" defer></script>
    <script src="/js/welcome.js" defer></script>
</head>
<body class="welcome-page">
    <div class="central">
        <header id="welcome">
            <img src="/img/logo.png" alt="logo" id="welcome-logo">
        </header>

        <div class="welcome-shell">
            <div class="genders">
                <div class="mens">
                    <img src="/img/mens icon.png" alt="men" id="mens-icon" width="120" height="120">
                    <span class="caption">Мужская одежда</span>
                </div>
                <div class="womens">
                    <img src="/img/womens icon.png" alt="women" id="womens-icon" width="120" height="120">
                    <span class="caption">Женская одежда</span>
                </div>
            </div>

            <div class="welcome-actions">
                <button type="button" class="btn btn--secondary welcome-all-btn welcome-glass welcome-glass--hover" id="all-catalog-btn">Весь каталог</button>
            </div>
        </div>
    </div>

    <div class="welcome-top-actions" aria-label="Действия">
        <a class="site-icon-btn" href="/login.html?mode=user" title="Аккаунт" aria-label="Аккаунт" data-account-action data-account-modal-trigger>
            <img src="/img/account.svg" alt="">
        </a>
    </div>
    
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <img src="/img/logo.png" alt="ООО КПВС" class="footer-logo">
                    <p class="footer-description">Производитель качественной спецодежды в Бресте</p>
                </div>
                <div class="footer-section">
                    <h4>Контакты</h4>
                    <p class="footer-contact"><img src="/img/location.svg" alt="" class="footer-icon" aria-hidden="true"> ул. л-та Рябцева, 44, Брест</p>
                    <p class="footer-contact"><img src="/img/phone.svg" alt="" class="footer-icon" aria-hidden="true"> +375 (162) 58-09-31</p>
                    <p class="footer-contact"><img src="/img/mail.svg" alt="" class="footer-icon" aria-hidden="true"> <a href="mailto:kpvssales@gmail.com">kpvssales@gmail.com</a></p>
                    <p class="footer-contact"><img src="/img/setting.svg" alt="" class="footer-icon" aria-hidden="true"> <a href="mailto:kpvssupport@gmail.com">kpvssupport@gmail.com</a></p>
                </div>
                <div class="footer-section">
                    <h4>Информация</h4>
                    <p>Доставка по Беларуси</p>
                    <p>Индивидуальный пошив</p>
                    <p>Гарантия качества</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ООО «КПВС». Все права защищены.</p>
            </div>
        </div>
    </footer>

</body>
</html>
