<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Вход · КПВС</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/utils/api.js" defer></script>
    <script src="/js/login.js" defer></script>
</head>
<body class="login-page">
    <main class="login-main">
        <a href="/welcome.html" class="login-back-link">← На сайт</a>

        <div class="login-container">
            <div class="login-card">
                <header class="login-card-header">
                    <div class="login-logo">
                        <img src="/img/logo.png" alt="ООО КПВС" width="160" height="48">
                    </div>
                    <div class="login-mode-tabs" role="tablist" aria-label="Режим входа">
                        <button type="button" class="login-mode-tab" id="tab-admin" role="tab" aria-controls="panel-admin" aria-selected="false">Админ</button>
                        <button type="button" class="login-mode-tab" id="tab-user" role="tab" aria-controls="panel-user" aria-selected="false">Пользователь</button>
                    </div>
                    <p class="login-badge" id="login-badge" aria-hidden="true"></p>
                    <h1 class="login-title" id="login-title"></h1>
                    <div class="site-subtitle-spacer" aria-hidden="true"></div>
                </header>

                <form id="login-form" class="login-form" method="post" novalidate>
                    <input type="hidden" id="auth-mode" name="mode" value="admin" />
                    <div class="form-row" id="row-identity">
                        <label for="login-username" id="login-username-label">Логин или email</label>
                        <input id="login-username" type="text" name="username" autocomplete="username" required placeholder="" />
                    </div>
                    <div class="form-row" id="row-email" hidden>
                        <label for="login-email">Email</label>
                        <input id="login-email" type="email" name="email" autocomplete="email" placeholder="name@example.com" />
                    </div>
                    <div class="form-row" id="row-email-code" hidden>
                        <label for="login-email-code">Код из письма</label>
                        <input id="login-email-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6 цифр" maxlength="6" />
                        <button type="button" class="login-switch-link" id="resend-email-code" hidden>Отправить код ещё раз</button>
                    </div>
                    <div class="form-row" id="row-password">
                        <label for="login-password">Пароль</label>
                        <div class="login-password-wrap">
                            <input id="login-password" class="login-password-input" type="password" name="password" autocomplete="current-password" required placeholder="Введите пароль" />
                            <button type="button" class="login-password-eye" id="login-password-toggle" aria-label="Показать пароль" aria-pressed="false">
                                <img src="/img/visible.svg" alt="" width="20" height="20" decoding="async" class="login-password-eye__icon" />
                            </button>
                        </div>
                    </div>
                    <div class="form-row" id="row-password2" hidden">
                        <label for="login-password2">Повторите пароль</label>
                        <div class="login-password-wrap">
                            <input id="login-password2" class="login-password-input" type="password" name="password2" autocomplete="new-password" placeholder="Повторите пароль" />
                            <button type="button" class="login-password-eye" id="login-password2-toggle" aria-label="Показать пароль" aria-pressed="false">
                                <img src="/img/visible.svg" alt="" width="20" height="20" decoding="async" class="login-password-eye__icon" />
                            </button>
                        </div>
                    </div>
                    <div id="login-error" class="login-error" role="alert" aria-live="polite"></div>
                    <div id="login-register-suggest" class="login-register-suggest" hidden>
                        <p id="login-register-suggest-msg" class="login-register-suggest__msg"></p>
                        <button type="button" class="btn btn--outline login-register-suggest__btn" id="login-go-register-btn">Зарегистрироваться</button>
                    </div>
                    <div class="login-submit-wrap">
                        <button type="submit" id="login-btn" class="btn btn--primary login-btn">Войти</button>
                    </div>
                    <div class="login-alt-actions" id="login-alt-actions">
                        <button type="button" class="btn btn--outline login-oauth-btn" id="oauth-google-btn">Войти через Google</button>
                        <button type="button" class="login-switch-link" id="toggle-recover">Забыли пароль?</button>
                        <button type="button" class="login-switch-link" id="toggle-recover-back" hidden>Назад к входу</button>
                        <button type="button" class="login-switch-link" id="toggle-register" hidden>Регистрация</button>
                        <button type="button" class="login-switch-link" id="toggle-login" hidden>У меня уже есть аккаунт</button>
                    </div>
                </form>

                <footer class="login-card-footer">
                    <p class="login-footer-note" id="login-footer-note"></p>
                </footer>
            </div>
        </div>
    </main>
</body>
</html>
