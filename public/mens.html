<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/logo-preview.png" type="image/png">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/img/logo-preview.png">
    <title>Мужская одежда · КПВС</title>
    <link rel="stylesheet" href="/css/site.css">
    <script src="/js/api.js"></script>
    <script src="/js/modal-lock.js" defer></script>
    <script src="/js/app-settings.js" defer></script>
    <script src="/js/account-modal.js" defer></script>
    <script src="/js/size-cascade.js" defer></script>
    <script src="/js/catalog.js" defer></script>
</head>
<body class="site-page catalog-page" data-gender="mens">
    <div class="container">
        <header>
            <div class="section site-header-bar">
                <a href="/welcome.html" class="site-logo-link" title="На главную"><img src="/img/logo.png" alt="ООО КПВС" id="logo" width="140" height="42"></a>
                <h1 class="site-header-title">Мужская одежда</h1>
                <div class="site-header-actions">
                    <button type="button" class="site-icon-btn" id="favorites-link" title="Избранное" aria-label="Избранное">
                        <img src="/img/like.svg" alt="">
                    </button>
                    <button type="button" class="site-icon-btn" id="cart" title="Корзина" aria-label="Корзина">
                        <img src="/img/cart.svg" alt="">
                    </button>
                    <a class="site-icon-btn" href="/login.html?mode=user" title="Аккаунт" aria-label="Аккаунт" data-account-action>
                        <img src="/img/account.svg" alt="">
                    </a>
                </div>
            </div>
        </header>
        <div class="site-subtitle-spacer" aria-hidden="true"></div>

        <div class="catalog-controls">
            <div class="catalog-search-row">
                <div class="catalog-search-wrap">
                    <input type="search" id="catalog-search" class="catalog-search-input" placeholder="Поиск по названию или артикулу…" autocomplete="off" />
                    <button type="button" id="catalog-search-clear" class="catalog-search-clear ui-xbtn" title="Очистить" aria-label="Очистить поиск" hidden>&times;</button>
                </div>
                <button type="button" id="filter-button" class="btn btn--primary admin-add-product-btn">Фильтры</button>
            </div>
            <div class="catalog-sort-row">
                <label for="sort-select" class="catalog-sort-label">Сортировка</label>
                <select id="sort-select" class="catalog-sort-select">
                    <option value="name_asc">По названию А–Я</option>
                    <option value="name_desc">По названию Я–А</option>
                    <option value="created_desc">Сначала новые</option>
                    <option value="created_asc">Сначала старые</option>
                    <option value="art_asc">По артикулу А–Я</option>
                    <option value="art_desc">По артикулу Я–А</option>
                </select>
            </div>
            <div id="active-filters" class="active-filters" style="display:none;"></div>
        </div>

        <div class="itemsContainer" id="items-container">
            <p class="catalog-loading">Загрузка товаров…</p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <img src="/img/logo.png" alt="ООО КПВС" class="footer-logo">
                    <p class="footer-description">Производитель качественной спецодежды в Бресте</p>
                </div>
                <div class="footer-section">
                    <h4>Контакты</h4>
                    <p class="footer-contact"><img src="/img/location.svg" alt="" class="footer-icon" aria-hidden="true"> ул. л-та Рябцева, 44, Брест</p>
                    <p class="footer-contact"><img src="/img/phone.svg" alt="" class="footer-icon" aria-hidden="true"> <a href="tel:+375162580931">+375 (162) 58-09-31</a></p>
                    <p class="footer-contact"><img src="/img/mail.svg" alt="" class="footer-icon" aria-hidden="true"> <a href="mailto:kpvssales@gmail.com">kpvssales@gmail.com</a></p>
                    <p class="footer-contact"><img src="/img/setting.svg" alt="" class="footer-icon" aria-hidden="true"> <a href="mailto:kpvssupport@gmail.com">kpvssupport@gmail.com</a></p>
                </div>
                <div class="footer-section">
                    <h4>Информация</h4>
                    <p>Доставка по Беларуси</p>
                    <p>Индивидуальный пошив</p>
                    <p>Гарантия качества</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
