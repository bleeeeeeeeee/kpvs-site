<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background-color: #f4f4f4; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>KPVS Site - API Test</h1>
    
    <h2>Server Status</h2>
    <div id="server-info"></div>
    
    <h2>API Endpoints Test</h2>
    <button onclick="testMensProducts()">Test /api/products/mens</button>
    <button onclick="testWomensProducts()">Test /api/products/womens</button>
    <button onclick="testProduct1()">Test /api/product/1</button>
    <button onclick="clearTests()">Clear Results</button>
    
    <div id="results"></div>

    <script>
        async function testEndpoint(url) {
            const resultsDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = 'test';
            
            try {
                console.log('Fetching:', url);
                const response = await fetch(url);
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    testDiv.className = 'test error';
                    testDiv.innerHTML = `
                        <h3>❌ ${url}</h3>
                        <p>HTTP Status: ${response.status}</p>
                    `;
                } else {
                    const data = await response.json();
                    testDiv.className = 'test success';
                    testDiv.innerHTML = `
                        <h3>✓ ${url}</h3>
                        <p>Status: ${response.status}</p>
                        <p>Data type: ${Array.isArray(data) ? 'Array' : 'Object'}</p>
                        <p>Size: ${JSON.stringify(data).length} bytes</p>
                        <pre>${JSON.stringify(data).substring(0, 200)}...</pre>
                    `;
                }
            } catch (error) {
                testDiv.className = 'test error';
                testDiv.innerHTML = `
                    <h3>❌ ${url}</h3>
                    <p>Error: ${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            }
            
            resultsDiv.appendChild(testDiv);
        }
        
        function testMensProducts() {
            testEndpoint('/api/products/mens');
        }
        
        function testWomensProducts() {
            testEndpoint('/api/products/womens');
        }
        
        function testProduct1() {
            testEndpoint('/api/product/1');
        }
        
        function clearTests() {
            document.getElementById('results').innerHTML = '';
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            const serverInfo = document.getElementById('server-info');
            serverInfo.innerHTML = `
                <div class="test">
                    <p><strong>Current URL:</strong> ${window.location.href}</p>
                    <p><strong>Hostname:</strong> ${window.location.hostname}</p>
                    <p><strong>Port:</strong> ${window.location.port || 'default'}</p>
                    <p><strong>Protocol:</strong> ${window.location.protocol}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
